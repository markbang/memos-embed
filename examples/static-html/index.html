<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memos Embed static example</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        padding: 40px 20px;
        font-family: Inter, system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      .stack {
        display: grid;
        gap: 24px;
        max-width: 860px;
        margin: 0 auto;
      }
    </style>
    <script type="module" src="https://unpkg.com/@memos-embed/wc@latest/dist/register.js"></script>
  </head>
  <body>
    <main class="stack">
      <section>
        <h1>Iframe embed</h1>
        <iframe
          src="https://your-site.com/embed/1?baseUrl=https%3A%2F%2Fdemo.usememos.com%2Fapi%2Fv1&theme=midnight&showAttachments=true&showReactions=true"
          title="Memos Embed"
          loading="lazy"
          style="border: none; border-radius: 16px; width: 100%; height: 280px"
        ></iframe>
      </section>

      <section>
        <h2>Web Component embed</h2>
        <memos-embed
          base-url="https://demo.usememos.com/api/v1"
          memo-id="1"
          theme="midnight"
          link-target="_blank"
          show-attachments="true"
          show-reactions="true"
        ></memos-embed>
      </section>
    </main>
  </body>
</html>
