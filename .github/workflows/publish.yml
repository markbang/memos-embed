name: Publish Packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main

concurrency:
  group: publish-packages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.CHANGESETS_GITHUB_TOKEN || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm validate

      - name: Detect pending changesets
        id: changesets
        run: |
          if find .changeset -maxdepth 1 -name "*.md" ! -name "README.md" ! -name "config.json" | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Version packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm version-packages

      - name: Commit versioned packages to main
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No versioned file changes to commit"
          else
            git commit -m "chore: release packages"
            git push origin HEAD:main
          fi

      - name: Snapshot existing package tags
        if: steps.changesets.outputs.has_changesets == 'true'
        run: git tag --format='%(refname:short)' | sort > /tmp/tags-before.txt

      - name: Publish packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Detect published package tags
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          git tag --format='%(refname:short)' | sort > /tmp/tags-after.txt
          comm -13 /tmp/tags-before.txt /tmp/tags-after.txt > /tmp/new-tags.txt

          if [ ! -s /tmp/new-tags.txt ]; then
            echo "Expected changeset publish to create new package tags, but none were found."
            exit 1
          fi

          echo "Published package tags:"
          cat /tmp/new-tags.txt

      - name: Push published package tags
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          while IFS= read -r tag; do
            git push origin "refs/tags/$tag"
          done < /tmp/new-tags.txt

      - name: Create GitHub releases with changelogithub
        if: steps.changesets.outputs.has_changesets == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || github.token }}
        run: |
          while IFS= read -r tag; do
            prefix="${tag%@*}"
            previous_tag=$(
              git for-each-ref \
                --sort=-creatordate \
                --format='%(refname:short)' \
                "refs/tags/${prefix}@*" \
                | { grep -Fvx "$tag" || true; } \
                | head -n 1
            )

            if [ -n "$previous_tag" ]; then
              pnpm exec changelogithub \
                --github "${{ github.repository }}" \
                --from "$previous_tag" \
                --to "$tag" \
                --name "$tag" \
                --contributors
            else
              pnpm exec changelogithub \
                --github "${{ github.repository }}" \
                --to "$tag" \
                --name "$tag" \
                --contributors
            fi
          done < /tmp/new-tags.txt
